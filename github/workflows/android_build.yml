name: Build Gemini APK

on:
  push:
    branches: [ "main" ] # تأكد أن اسم الفرع الأساسي عندك هو main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'

    # هذه الخطوة ستحل مشكلة ملفات Gradle الناقصة التي ناقشناها
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: 7.5

    - name: Build with Gradle
      run: gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: MyGeminiApp-Installer
        path: app/build/outputs/apk/debug/app-debug.apk
