<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جيمناي السياني</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.png" type="image/png">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .controls { display: flex; flex-direction: column; gap: 15px; align-items: center; margin-top: 30px; }
        .btn { 
            padding: 15px 30px; 
            width: 200px;
            cursor: pointer; 
            border: none; 
            border-radius: 10px; 
            background-color: #1a73e8; 
            color: white; 
            font-size: 18px; 
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>جيمناي السياني</h1>

    <div class="controls">
        <label class="btn">
            فتح الكاميرا
            <input type="file" accept="image/*" capture="environment" style="display: none;">
        </label>

        <label class="btn" style="background-color: #34a853;">
            تحميل ملف
            <input type="file" style="display: none;">
        </label>

        <label class="btn" style="background-color: #ea4335;">
            مسجل الصوت
            <input type="file" accept="audio/*" style="display: none;">
        </label>
    </div>

</body>
</html>
